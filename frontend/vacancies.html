<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакансии - Биржа труда</title>
    <link rel="stylesheet" href="../frontend/styles.css">
    </head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">JobBoard</div>
                <div class="nav-links">
                    <a href="index.html">Главная</a>
                    <div id="auth-links"></div>
                </div>
            </nav>
        </div>
    </header>
    <div class="container">
        <div class="vacancies-page">
            <h1>Вакансии</h1>            
            <div class="filters">
                <div class="filters-grid">
                    <div class="filter-group">
                        <label for="filter-search">Поиск</label>
                        <input type="text" id="filter-search" placeholder="Должность, компания...">
                    </div>
                    
                    <div class="filter-group">
                        <label for="filter-city">Город</label>
                        <input type="text" id="filter-city" placeholder="Например: Москва">
                    </div>
                    
                    <div class="filter-group">
                        <label for="filter-salary">Мин. зарплата</label>
                        <input type="number" id="filter-salary" placeholder="₽">
                    </div>
                    
                    <div class="filter-group">
                        <label for="filter-experience">Опыт</label>
                        <select id="filter-experience">
                            <option value="">Любой</option>
                            <option value="Без опыта">Без опыта</option>
                            <option value="1-3 года">1-3 года</option>
                            <option value="3-5 лет">3-5 лет</option>
                            <option value="5+ лет">5+ лет</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="filter-employment">Тип занятости</label>
                        <select id="filter-employment">
                            <option value="">Любой</option>
                            <option value="Полная">Полная</option>
                            <option value="Частичная">Частичная</option>
                            <option value="Удаленная">Удаленная</option>
                            <option value="Проектная">Проектная</option>
                        </select>
                    </div>
                </div>
                
                <div class="filter-actions">
                    <button class="btn btn-primary" onclick="applyFilters()">Найти</button>
                    <button class="btn btn-secondary" onclick="resetFilters()">Сбросить</button>
                </div>
            </div>
            <div id="vacancies-list">
                <p>Загрузка вакансий...</p>
            </div>
            <div class="pagination" id="pagination">
                <button id="prev-btn" onclick="changePage(-1)">← Назад</button>
                <span id="page-info">Страница 1</span>
                <button id="next-btn" onclick="changePage(1)">Вперёд →</button>
            </div>
        </div>
    </div>    
    <footer>
        <div class="container">
            <p>&copy; 2026 JobBoard. Учебный проект.</p>
        </div>
    </footer>
    
    <script src="../frontend/scripts.js"></script>
    </body>
</html>
